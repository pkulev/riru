name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  readme:
    name: README package index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          bb: latest

      - name: Check package index
        run: bb readme:packages:check

  pkgcheck:
    name: pkgcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pkgcore/pkgcheck-action@v1
        with:
          args: >-
            --keywords=-RedundantVersion
            --net
